version: 0.2

# EventForge standalone — push main → CodeBuild → ECR eventforge:latest → ECS eventforge

env:
  variables:
    DOCKER_BUILDKIT: "1"
    IMAGE_REPO_NAME: "eventforge"
    IMAGE_TAG: "latest"
    CONTAINER_NAME: "eventforge"
    ECS_CLUSTER_NAME: "loboforge"
    ECS_SERVICE_NAME: "eventforge"

phases:
  install:
    runtime-versions:
      dotnet: 8.0
      nodejs: 20
  pre_build:
    commands:
      - echo "Running EventForge unit tests..."
      - dotnet test EventForge.Tests/EventForge.Tests.csproj --configuration Release --verbosity normal
      - echo "Logging in to Amazon ECR..."
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
      - REPOSITORY_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$IMAGE_REPO_NAME
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - IMAGE_URI=$REPOSITORY_URI:$IMAGE_TAG
      - echo "Building EventForge $IMAGE_URI (commit eventforge-$COMMIT_HASH)"
  build:
    commands:
      - docker build -f Dockerfile --build-arg BUILDKIT_INLINE_CACHE=1 -t $IMAGE_URI .
      - docker tag $IMAGE_URI $REPOSITORY_URI:$COMMIT_HASH
  post_build:
    commands:
      - docker push $IMAGE_URI
      - docker push $REPOSITORY_URI:$COMMIT_HASH
      - printf '[{"name":"%s","imageUri":"%s"}]' "$CONTAINER_NAME" "$IMAGE_URI" > imagedefinitions.json
      - aws ecs update-service --cluster ${ECS_CLUSTER_NAME} --service ${ECS_SERVICE_NAME} --force-new-deployment --region $AWS_DEFAULT_REGION
      - aws ecs wait services-stable --cluster ${ECS_CLUSTER_NAME} --services ${ECS_SERVICE_NAME} --region $AWS_DEFAULT_REGION
      - curl -sf https://eventforge.loboforge.com/health || echo "WARN public health check failed"
      - echo "EventForge deploy completed $(date)"

artifacts:
  files:
    - imagedefinitions.json
