version: 0.2

# EventForge standalone — push main → CodeBuild → ECR eventforge-standalone-* → ECS eventforge
# NEVER use loboforge:eventforge-latest (LoboForge.Studio monorepo overwrites that tag).

env:
  variables:
    DOCKER_BUILDKIT: "1"
    IMAGE_REPO_NAME: "loboforge"
    IMAGE_TAG: "eventforge-standalone-latest"
    CONTAINER_NAME: "eventforge"
    ECS_CLUSTER_NAME: "loboforge"
    ECS_SERVICE_NAME: "eventforge"

phases:
  install:
    runtime-versions:
      dotnet: 8.0
      nodejs: 20
  pre_build:
    commands:
      - echo "Running EventForge CI gate (tests + web build)..."
      - chmod +x scripts/ci.sh
      - bash scripts/ci.sh
      - echo "Logging in to Amazon ECR..."
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
      - REPOSITORY_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$IMAGE_REPO_NAME
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - IMAGE_URI=$REPOSITORY_URI:eventforge-standalone-$COMMIT_HASH
      - echo "Building EventForge $IMAGE_URI"
  build:
    commands:
      - docker build -f Dockerfile --build-arg BUILDKIT_INLINE_CACHE=1 -t $IMAGE_URI .
      - docker tag $IMAGE_URI $REPOSITORY_URI:$IMAGE_TAG
  post_build:
    commands:
      - docker push $IMAGE_URI
      - docker push $REPOSITORY_URI:$IMAGE_TAG
      - chmod +x scripts/eventforge-ecs-deploy.sh scripts/eventforge-deploy-health-gate.sh
      - bash scripts/eventforge-ecs-deploy.sh "$IMAGE_URI"
      - bash scripts/eventforge-deploy-health-gate.sh https://eventforge.loboforge.com "$COMMIT_HASH"
      - printf '[{"name":"%s","imageUri":"%s"}]' "$CONTAINER_NAME" "$IMAGE_URI" > imagedefinitions.json
      - echo "EventForge deploy completed $(date) commit=$COMMIT_HASH"

artifacts:
  files:
    - imagedefinitions.json
