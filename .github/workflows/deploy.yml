name: Deploy EventForge

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Start CodeBuild and wait
        run: |
          BUILD_ID=$(aws codebuild start-build \
            --project-name eventforge_github \
            --source-version "${{ github.sha }}" \
            --region us-east-2 \
            --query 'build.id' --output text)
          echo "Started CodeBuild: $BUILD_ID"
          for i in $(seq 1 90); do
            STATUS=$(aws codebuild batch-get-builds --ids "$BUILD_ID" --region us-east-2 \
              --query 'builds[0].buildStatus' --output text)
            PHASE=$(aws codebuild batch-get-builds --ids "$BUILD_ID" --region us-east-2 \
              --query 'builds[0].currentPhase' --output text)
            echo "[$i] $PHASE — $STATUS"
            case "$STATUS" in
              SUCCEEDED) exit 0 ;;
              FAILED|FAULT|STOPPED|TIMED_OUT) exit 1 ;;
            esac
            sleep 30
          done
          echo "Timed out waiting for CodeBuild"
          exit 1
